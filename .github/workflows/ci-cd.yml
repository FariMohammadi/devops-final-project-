name: DevOps CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Run tests
        run: |
          python -m unittest discover app


  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t devops-app .

      - name: Run container test
        run: |
          docker run -d -p 5000:5000 --name test_app devops-app
          sleep 5
          curl http://localhost:5000 || true
          docker stop test_app
          docker rm test_app


  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy simulation
        run: |
          docker build -t devops-app:prod .
          docker run -d -p 5001:5000 --name prod_app devops-app:prod
          sleep 5
          curl http://localhost:5001 || true
          docker stop prod_app
          docker rm prod_app