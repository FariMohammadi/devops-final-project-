name: DevOps CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Run basic tests
        run: |
          python -m unittest discover app


  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t devops-task-manager:latest .


      - name: Run container (smoke test)
        run: |
          docker run -d -p 5000:5000 --name test_app devops-task-manager:latest
          sleep 5
          curl http://localhost:5000 || true
          docker stop test_app
          docker rm test_app


  deploy:
    name: Simulated Deployment
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run production container (simulation)
        run: |
          docker build -t devops-task-manager:prod .
          docker run -d -p 5001:5000 --name prod_app devops-task-manager:prod
          sleep 5
          curl http://localhost:5001 || true
          docker stop prod_app
          docker rm prod_app