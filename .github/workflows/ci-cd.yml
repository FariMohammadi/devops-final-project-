name: DevOps CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Run Tests
  # ─────────────────────────────────────────
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Run tests with pytest
        run: |
          cd app
          pytest test_app.py -v

  # ─────────────────────────────────────────
  # JOB 2: Build Docker Image
  # ─────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test   # Only runs if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t devops-task-manager:latest .

      - name: Smoke test the container
        run: |
          docker run -d -p 5000:5000 --name app_test devops-task-manager:latest
          sleep 5
          curl -f http://localhost:5000/api/health
          docker stop app_test
          docker rm app_test

      - name: Save image as artifact
        run: |
          docker save devops-task-manager:latest | gzip > devops-task-manager.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: devops-task-manager.tar.gz

  # ─────────────────────────────────────────
  # JOB 3: Deploy (simulated)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy (Simulated)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: |
          docker load < devops-task-manager.tar.gz

      - name: Simulate deployment
        run: |
          echo "==============================="
          echo "  Deploying to production...  "
          echo "==============================="
          docker run -d -p 5000:5000 --name prod_app devops-task-manager:latest
          sleep 3
          echo "App is running. Health check:"
          curl -s http://localhost:5000/api/health | python3 -m json.tool
          echo "Deployment complete!"
